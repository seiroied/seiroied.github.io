<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Service Questionnaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #9ca3af);
            --tg-button: var(--tg-theme-button-color, #3b82f6);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f3f4f6);
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            background-color: var(--tg-bg);
            transition: transform 0.35s ease-in-out;
            transform: translateX(100%);
            overflow-y: auto;
        }
        .view.active {
            transform: translateX(0);
        }
        .view.exit-left {
            transform: translateX(-100%);
        }
        .view-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
        }
        .menu-button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background-color: var(--tg-button);
            color: var(--tg-button-text);
            transition: opacity 0.2s;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--tg-hint);
            border-radius: 8px;
            background-color: var(--tg-secondary-bg);
            color: var(--tg-text);
            transition: border-color 0.2s;
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--tg-button);
        }
        .progress-bar-container {
            width: 100%;
            background-color: var(--tg-secondary-bg);
            border-radius: 99px;
            margin-bottom: 1rem;
        }
        .progress-bar {
            height: 8px;
            width: 0%;
            background-color: var(--tg-button);
            border-radius: 99px;
            transition: width 0.3s ease-in-out;
        }
        .question-container {
            text-align: center;
        }
        .question-label {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .next-button {
            margin-top: 1.5rem;
            display: inline-block;
            padding: 0.75rem 2rem;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Home Screen View -->
        <div id="home-view" class="view active">
            <h1 class="view-title mt-12">What do you like to order?</h1>
            <div class="space-y-4 mt-8">
                <button class="menu-button" data-category="website">Website</button>
                <button class="menu-button" data-category="Telegram-bot">Telegram Bot</button>
                <button class="menu-button" data-category="Logo">Logo Design</button>
            </div>
        </div>

        <!-- Dynamic Questionnaire View -->
        <div id="questionnaire-view" class="view">
            <!-- Content will be injected by JavaScript -->
        </div>

        <!-- The other full-form views are now replaced by the dynamic one -->

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tg = window.Telegram.WebApp;
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzdCDW2bArm57Irhhe-_gdZIZDkRQrLgey1PNrgH8SySk-64JXUu2nlu-hHvypGGhA/exec';
            
            // --- QUESTIONNAIRE DATA ---
            const questionnaires = {
                website: [
                    { name: 'projectName', label: 'What is the name of your business or project?', type: 'text' },
                    { name: 'projectDescription', label: 'Briefly describe what your business does.', type: 'textarea' },
                    { name: 'targetAudience', label: 'Who is your target audience?', type: 'text' },
                    { name: 'primaryGoal', label: 'What is the main goal of this website? (e.g., Sell products, generate leads)', type: 'text' },
                    { name: 'brandingInfo', label: 'Do you have an existing logo or brand colors?', type: 'text' },
                    { name: 'requiredFeatures', label: 'Any specific features needed? (e.g., Blog, E-commerce)', type: 'textarea' }
                ],
                // You can add 'Telegram-bot' and 'Logo' questions here later
            };

            let currentView = 'home-view';
            let currentQuestionnaire = null;
            let currentQuestionIndex = 0;
            let answers = {};

            tg.ready();
            tg.expand();
            tg.MainButton.hide();

            function navigateTo(viewId) {
                const currentViewEl = document.getElementById(currentView);
                const nextViewEl = document.getElementById(viewId);
                
                if (currentViewEl && nextViewEl) {
                    currentViewEl.classList.add('exit-left');
                    nextViewEl.classList.remove('exit-left');
                    nextViewEl.classList.add('active');
                    setTimeout(() => currentViewEl.classList.remove('active'), 350);
                }
                currentView = viewId;
            }

            function startQuestionnaire(category) {
                currentQuestionnaire = questionnaires[category];
                if (!currentQuestionnaire) {
                    // Fallback for categories not yet converted to step-by-step
                    tg.showAlert(`The questionnaire for "${category}" is not yet available.`);
                    return;
                }
                answers = { category: category }; // Reset answers
                currentQuestionIndex = 0;
                renderQuestion();
                navigateTo('questionnaire-view');
            }

            function renderQuestion() {
                const qView = document.getElementById('questionnaire-view');
                if (!currentQuestionnaire) return;

                const question = currentQuestionnaire[currentQuestionIndex];
                const totalQuestions = currentQuestionnaire.length;
                const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;

                let inputHtml;
                if (question.type === 'textarea') {
                    inputHtml = `<textarea id="q-input" name="${question.name}" class="form-input" rows="4" required></textarea>`;
                } else {
                    inputHtml = `<input type="${question.type}" id="q-input" name="${question.name}" class="form-input" required>`;
                }

                qView.innerHTML = `
                    <div class="pt-4">
                        <p class="text-sm text-center" style="color: var(--tg-hint);">Step ${currentQuestionIndex + 1} of ${totalQuestions}</p>
                        <div class="progress-bar-container"><div class="progress-bar" style="width: ${progress}%;"></div></div>
                        <div class="question-container mt-8">
                            <label for="q-input" class="question-label">${question.label}</label>
                            <form id="question-form">
                                ${inputHtml}
                                <button type="submit" class="menu-button next-button">Next →</button>
                            </form>
                        </div>
                    </div>
                `;

                const form = document.getElementById('question-form');
                const input = document.getElementById('q-input');
                input.focus();

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    handleNext();
                });

                // Configure Telegram Main Button for the last question
                if (currentQuestionIndex === totalQuestions - 1) {
                    document.querySelector('.next-button').remove(); // Remove HTML next button
                    tg.MainButton.text = 'SUBMIT ANSWERS';
                    tg.MainButton.show();
                } else {
                    tg.MainButton.hide();
                }
            }

            function handleNext() {
                const input = document.getElementById('q-input');
                if (!input.value) {
                    tg.showAlert('Please provide an answer.');
                    return;
                }
                answers[input.name] = input.value;
                currentQuestionIndex++;

                if (currentQuestionIndex < currentQuestionnaire.length) {
                    renderQuestion();
                }
            }
            
            async function submitData() {
                // Handle submission for the last question
                const lastInput = document.getElementById('q-input');
                if (lastInput && !answers[lastInput.name]) {
                   answers[lastInput.name] = lastInput.value;
                }

                tg.MainButton.showProgress();
                tg.MainButton.disable();

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        redirect: "follow",
                        body: JSON.stringify(answers),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    });
                    const result = await response.json();
                    if (result.status !== 'success') throw new Error(result.message);

                    tg.showAlert('Your information has been submitted successfully!');
                    setTimeout(() => tg.close(), 1500);

                } catch (error) {
                    tg.showAlert(`An error occurred: ${error.message}`);
                    tg.MainButton.hideProgress();
                    tg.MainButton.enable();
                }
            }

            document.querySelectorAll('.menu-button').forEach(button => {
                button.addEventListener('click', () => {
                    startQuestionnaire(button.dataset.category);
                });
            });

            tg.MainButton.onClick(submitData);
        });
    </script>
</body>
</html>
