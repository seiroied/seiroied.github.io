<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Service Questionnaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #9ca3af);
            --tg-button: var(--tg-theme-button-color, #3b82f6);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f3f4f6);
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            background-color: var(--tg-bg);
            transition: transform 0.35s ease-in-out;
            transform: translateX(100%);
            overflow-y: auto;
        }
        .view.active { transform: translateX(0); }
        .view.exit-left { transform: translateX(-100%); }
        .view-title { font-size: 1.5rem; font-weight: 700; text-align: center; }
        .menu-button {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background-color: var(--tg-button);
            color: var(--tg-button-text);
            transition: opacity 0.2s;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--tg-hint);
            border-radius: 8px;
            background-color: var(--tg-secondary-bg);
            color: var(--tg-text);
            transition: border-color 0.2s;
            font-size: 1rem;
        }
        .form-input:focus { outline: none; border-color: var(--tg-button); }
        .progress-bar-container { width: 100%; background-color: var(--tg-secondary-bg); border-radius: 99px; margin-bottom: 1rem; }
        .progress-bar { height: 8px; width: 0%; background-color: var(--tg-button); border-radius: 99px; transition: width 0.3s ease-in-out; }
        .question-container { text-align: center; }
        .question-label { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; animation: fadeIn 0.5s ease-in-out; }
        .next-button { margin-top: 1.5rem; display: inline-block; padding: 0.75rem 2rem; }
        .back-button {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tg-text);
            font-size: 1.5rem;
            line-height: 1;
            padding: 0.5rem;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Home Screen View -->
        <div id="home-view" class="view active">
            <div class="text-center mt-12">
                <h1 id="welcome-title" class="view-title">Welcome!</h1>
                <p class="mb-8" style="color: var(--tg-hint);">What do you like to order?</p>
            </div>
            <div class="space-y-4">
                <button class="menu-button" data-category="website">Website</button>
                <button class="menu-button" data-category="Telegram-bot">Telegram Bot</button>
                <button class="menu-button" data-category="Logo">Logo Design</button>
            </div>
        </div>

        <!-- Dynamic Questionnaire View -->
        <div id="questionnaire-view" class="view">
            <!-- Content will be injected by JavaScript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tg = window.Telegram.WebApp;
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzdCDW2bArm57Irhhe-_gdZIZDkRQrLgey1PNrgH8SySk-64JXUu2nlu-hHvypGGhA/exec'; // Replace with your Web App URL
            const SECRET_KEY = 'your_secret_key'; // Must match the Apps Script SECRET_KEY

            const questionnaires = {
                website: [
                    { name: 'projectName', label: 'What is the name of your business or project?', type: 'text', validate: value => value.length >= 3 },
                    { name: 'projectDescription', label: 'Briefly describe what your business does.', type: 'textarea', validate: value => value.length >= 10 },
                    { name: 'targetAudience', label: 'Who is your target audience?', type: 'text', validate: value => value.length >= 3 },
                    { name: 'primaryGoal', label: 'What is the main goal of this website? (e.g., Sell products, generate leads)', type: 'text', validate: value => value.length >= 5 },
                    { name: 'brandingInfo', label: 'Do you have an existing logo or brand colors?', type: 'text', validate: value => value.length >= 3 },
                    { name: 'requiredFeatures', label: 'Any specific features needed? (e.g., Blog, E-commerce)', type: 'textarea', validate: value => value.length >= 10 }
                ],
                'Telegram-bot': [
                    { name: 'botPurpose', label: 'What is the main purpose of your bot?', type: 'textarea', validate: value => value.length >= 10 },
                    { name: 'botName', label: 'Do you have a preferred name or username for the bot?', type: 'text', validate: value => value.length >= 3 },
                    { name: 'keyCommands', label: 'List some key commands you envision (e.g., /start, /help, /data).', type: 'text', validate: value => value.length >= 5 },
                    { name: 'userInteraction', label: 'How should the bot interact with users? (e.g., Buttons, forms, simple text)', type: 'textarea', validate: value => value.length >= 10 },
                    { name: 'integrationNeeds', label: 'Does it need to connect to other websites or APIs?', type: 'text', validate: value => value.length >= 3 }
                ],
                Logo: [
                    { name: 'companyName', label: 'What is the exact name to appear in the logo?', type: 'text', validate: value => value.length >= 3 },
                    { name: 'tagline', label: 'Is there a tagline to include?', type: 'text', validate: value => value.length >= 0 }, // Optional
                    { name: 'stylePreference', label: 'Describe the desired style (e.g., modern, classic, minimalist, fun).', type: 'textarea', validate: value => value.length >= 10 },
                    { name: 'brandColors', label: 'What are your preferred brand colors?', type: 'text', validate: value => value.length >= 3 },
                    { name: 'inspiration', label: 'Are there any existing logos you admire? Why?', type: 'textarea', validate: value => value.length >= 10 }
                ]
            };

            let currentView = 'home-view';
            let currentQuestionnaire = null;
            let currentQuestionIndex = 0;
            let answers = {};

            tg.ready();
            tg.expand();
            tg.MainButton.hide();

            // Personalize Welcome Message
            const welcomeTitle = document.getElementById('welcome-title');
            if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) {
                welcomeTitle.textContent = `Welcome, ${tg.initDataUnsafe.user.first_name}!`;
            }

            function navigateTo(viewId, direction = 'forward') {
                const currentViewEl = document.getElementById(currentView);
                const nextViewEl = document.getElementById(viewId);
                if (currentViewEl && nextViewEl) {
                    if (direction === 'forward') {
                        currentViewEl.classList.add('exit-left');
                        nextViewEl.classList.remove('exit-left');
                    } else {
                        nextViewEl.classList.add('exit-left');
                        requestAnimationFrame(() => nextViewEl.classList.remove('exit-left'));
                        currentViewEl.classList.remove('active');
                    }
                    nextViewEl.classList.add('active');
                    if (direction === 'forward') {
                        setTimeout(() => currentViewEl.classList.remove('active'), 350);
                    }
                }
                currentView = viewId;
            }

            function startQuestionnaire(category) {
                currentQuestionnaire = questionnaires[category];
                answers = { category: category };
                currentQuestionIndex = 0;
                renderQuestion();
                navigateTo('questionnaire-view', 'forward');
            }

            function goHome() {
                navigateTo('home-view', 'backward');
                tg.MainButton.hide();
            }

            function renderQuestion() {
                const qView = document.getElementById('questionnaire-view');
                const question = currentQuestionnaire[currentQuestionIndex];
                const totalQuestions = currentQuestionnaire.length;
                const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;

                const inputHtml = question.type === 'textarea'
                    ? `<textarea id="q-input" name="${question.name}" class="form-input" rows="4" required>${answers[question.name] || ''}</textarea>`
                    : `<input type="${question.type}" id="q-input" name="${question.name}" class="form-input" value="${answers[question.name] || ''}" required>`;

                qView.innerHTML = `
                    <button class="back-button" id="back-btn">‹</button>
                    <div class="pt-12">
                        <p class="text-sm text-center" style="color: var(--tg-hint);">Step ${currentQuestionIndex + 1} of ${totalQuestions}</p>
                        <div class="progress-bar-container"><div class="progress-bar" style="width: ${progress}%;"></div></div>
                        <div class="question-container mt-8">
                            <label for="q-input" class="question-label">${question.label}</label>
                            <form id="question-form">${inputHtml}
                                ${currentQuestionIndex > 0 ? '<button type="button" id="prev-btn" class="menu-button next-button mr-2">Previous</button>' : ''}
                                <button type="submit" class="menu-button next-button">${currentQuestionIndex === totalQuestions - 1 ? 'Review' : 'Next →'}</button>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('back-btn').addEventListener('click', goHome);
                document.getElementById('question-form').addEventListener('submit', e => { e.preventDefault(); handleNext(); });
                if (currentQuestionIndex > 0) document.getElementById('prev-btn').addEventListener('click', () => { currentQuestionIndex--; renderQuestion(); });
                document.getElementById('q-input').focus();

                if (currentQuestionIndex === totalQuestions - 1) {
                    tg.MainButton.text = 'SUBMIT ANSWERS';
                    tg.MainButton.show();
                } else {
                    tg.MainButton.hide();
                }
            }

            function handleNext() {
                const input = document.getElementById('q-input');
                const question = currentQuestionnaire[currentQuestionIndex];
                if (!input.value || (question.validate && !question.validate(input.value))) {
                    tg.showAlert('Please provide a valid answer (e.g., minimum 3 characters for text, 10 for descriptions).');
                    return;
                }
                answers[input.name] = input.value;
                currentQuestionIndex++;
                if (currentQuestionIndex < currentQuestionnaire.length) {
                    renderQuestion();
                } else {
                    renderReview();
                }
            }

            function renderReview() {
                const qView = document.getElementById('questionnaire-view');
                let reviewHtml = '<h2 class="view-title">Review Your Answers</h2><ul class="space-y-4">';
                currentQuestionnaire.forEach(q => {
                    reviewHtml += `<li><strong>${q.label}</strong><br>${answers[q.name]}</li>`;
                });
                reviewHtml += '</ul>';
                qView.innerHTML = `
                    <button class="back-button" id="back-btn">‹</button>
                    <div class="pt-12">${reviewHtml}</div>
                `;
                document.getElementById('back-btn').addEventListener('click', () => { currentQuestionIndex--; renderQuestion(); });
                tg.MainButton.text = 'SUBMIT ANSWERS';
                tg.MainButton.show();
            }

            async function submitData() {
                const userId = tg.initDataUnsafe.user.id;
                const token = btoa(userId + ":" + SECRET_KEY);
                answers.token = token;
                answers.telegram_user_id = userId;
                answers.telegram_username = tg.initDataUnsafe.user.username || 'N/A';
                answers.telegram_first_name = tg.initDataUnsafe.user.first_name || 'User';

                tg.MainButton.showProgress();
                tg.MainButton.disable();

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        redirect: "follow",
                        body: JSON.stringify(answers),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    });
                    const result = await response.json();
                    if (result.status !== 'success') throw new Error(result.message);
                    tg.close(); // Closes after successful submission
                } catch (error) {
                    tg.showAlert(`An error occurred: ${error.message}`);
                    tg.MainButton.hideProgress();
                    tg.MainButton.enable();
                }
            }

            document.querySelectorAll('.menu-button').forEach(button => {
                button.addEventListener('click', () => startQuestionnaire(button.dataset.category));
            });
            tg.MainButton.onClick(submitData);
        });
    </script>
</body>
</html>
