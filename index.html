<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فرم ببت بطلاعات</title>
    <!-- Using Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- The official Telegram Mini App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/script.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style></style>
  </head>
  <body>
    <div class="form-container">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold">فرم برود بطلاعات</h1>
        <p class="text-sm" style="color: var(--tg-theme-hint-color, #6b7280)">
          لطشن سوالات زیر را تاسخ دهید.
        </p>
      </div>

      <!-- The form to collect user data -->
      <form id="userInfoForm">
        <div class="space-y-4">
          <div>
            <label for="name" class="block text-sm font-medium mb-1"
              >نان و نان شانودادگی</label
            >
            <input
              type="text"
              id="name"
              name="name"
              class="form-input"
              placeholder="مثلن شرناز"
              required
            />
          </div>
          <div>
            <label for="email" class="block text-sm font-medium mb-1"
              >بیمیل</label
            >
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="you@example.com"
              required
            />
          </div>
          <div>
            <label for="project" class="block text-sm font-medium mb-1"
              >بوضیحات</label
            >
            <textarea
              id="project"
              name="project"
              rows="4"
              class="form-input"
              placeholder="اینجا بوضیحاتت رو دندیس"
              required
            ></textarea>
          </div>
        </div>
        <!-- The HTML submit button has been removed. The Telegram Main Button is now the only submit method. -->
      </form>

      <!-- Message box for showing success or error messages -->
      <div id="messageBox" class="message-box"></div>
    </div>

    <script></script>
  </body>
</html>
